# Agent name: agent
agent.sources  = src1
agent.sinks    = sink1
agent.channels = ch1

# ─── SOURCE : surveille le dossier /logs pour de nouveaux fichiers ───────────
agent.sources.src1.type        = spooldir
agent.sources.src1.spoolDir    = /logs
agent.sources.src1.fileHeader  = true
agent.sources.src1.channels    = ch1

# ─── CHANNEL : mémoire tampon in-memory ──────────────────────────────────────
agent.channels.ch1.type                = memory
agent.channels.ch1.capacity            = 10000
agent.channels.ch1.transactionCapacity = 1000

# ─── SINK : écrit dans HDFS ──────────────────────────────────────────────────
agent.sinks.sink1.type              = hdfs
agent.sinks.sink1.hdfs.path         = hdfs://namenode:9000/data/flume_logs
agent.sinks.sink1.hdfs.fileType     = DataStream
agent.sinks.sink1.hdfs.writeFormat  = Text
agent.sinks.sink1.hdfs.rollInterval = 30
agent.sinks.sink1.hdfs.rollSize     = 0
agent.sinks.sink1.hdfs.rollCount    = 0
agent.sinks.sink1.channel           = ch1
